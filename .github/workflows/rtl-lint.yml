name: RTL Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verilator-lint:
    name: Verilator lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends verilator

      - name: Show tool version
        run: verilator --version

      - name: Lint synthesizable RTL
        run: |
          verilator \
            --lint-only \
            --Wall \
            --Wno-UNUSED \
            --sv \
            --top-module async_fifo \
            rtl/sync_2ff.sv \
            rtl/gray_counter.sv \
            rtl/async_fifo.sv
